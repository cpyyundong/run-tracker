<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RunTrack - 跑步打卡社区</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2a2a38;
    --text: #e2e2e8;
    --text-muted: #8888a0;
    --accent: #ff6b35;
    --accent-glow: rgba(255,107,53,0.25);
    --accent2: #ff8c5a;
    --green: #2ecc71;
    --green-glow: rgba(46,204,113,0.2);
    --red: #e74c3c;
    --radius: 14px;
    --radius-sm: 10px;
    --transition: 0.2s ease;
    --nav-h: 64px;
    --max-w: 720px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{font-size:16px;scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(var(--nav-h) + 20px);
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,107,53,0.06), transparent),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(46,204,113,0.04), transparent);
    pointer-events:none;z-index:0;
  }
  .container{max-width:var(--max-w);margin:0 auto;padding:20px 16px 0;position:relative;z-index:1}

  /* ===== Auth Overlay ===== */
  .auth-overlay{
    position:fixed;inset:0;z-index:300;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;padding:20px;
  }
  .auth-overlay::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,107,53,0.08), transparent),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(46,204,113,0.05), transparent);
    pointer-events:none;z-index:0;
  }
  .auth-card{
    position:relative;z-index:1;width:100%;max-width:380px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:32px 28px;
  }
  .auth-logo{
    text-align:center;margin-bottom:24px;
  }
  .auth-logo .logo-icon{
    width:56px;height:56px;
    background:linear-gradient(135deg,var(--accent),#e55a2b);
    border-radius:16px;display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 6px 30px var(--accent-glow);
  }
  .auth-logo .logo-icon svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:2.5}
  .auth-logo h2{font-size:1.6rem;margin-top:12px;font-weight:700}
  .auth-logo h2 span{color:var(--accent)}
  .auth-tabs{
    display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);
    border-radius:var(--radius-sm);overflow:hidden;
  }
  .auth-tab{
    flex:1;padding:10px;text-align:center;background:var(--surface2);
    color:var(--text-muted);cursor:pointer;font-size:0.88rem;font-weight:500;
    transition:var(--transition);border:none;
  }
  .auth-tab.active{background:var(--accent);color:#fff;}
  .auth-form{display:none}
  .auth-form.active{display:block}
  .auth-form .form-group{margin-bottom:14px}
  .auth-form .form-group label{display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:5px;font-weight:500}
  .auth-form .form-group input{
    width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:12px;color:var(--text);
    font-size:0.92rem;outline:none;transition:var(--transition)
  }
  .auth-form .form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .auth-btn{
    width:100%;background:linear-gradient(135deg,var(--accent),#e55a2b);
    color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;
    font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:8px;
    transition:var(--transition);letter-spacing:0.02em
  }
  .auth-btn:hover{box-shadow:0 4px 22px var(--accent-glow);transform:translateY(-1px)}
  .auth-error{color:var(--red);font-size:0.78rem;margin-top:8px;text-align:center;min-height:20px}
  .auth-success{color:var(--green);font-size:0.78rem;margin-top:8px;text-align:center;min-height:20px}

  /* ===== User Bar ===== */
  .user-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:20;
  }
  .user-bar-left{display:flex;align-items:center;gap:10px}
  .user-bar-avatar{
    width:32px;height:32px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#e55a2b);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:0.8rem;color:#fff;
  }
  .user-bar-name{font-size:0.9rem;font-weight:600}
  .user-bar-logout{
    background:transparent;color:var(--text-muted);border:1px solid var(--border);
    border-radius:8px;padding:5px 14px;font-size:0.75rem;cursor:pointer;
    transition:var(--transition)
  }
  .user-bar-logout:hover{color:var(--red);border-color:var(--red)}

  /* ===== Timer ===== */
  .timer-section{text-align:center;margin-bottom:16px}
  .timer-circle{
    width:160px;height:160px;border-radius:50%;
    border:4px solid var(--border);margin:0 auto;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;transition:var(--transition);position:relative;
    background:var(--surface);user-select:none;
  }
  .timer-circle:hover{border-color:var(--accent)}
  .timer-circle.running{
    border-color:var(--accent);
    box-shadow:0 0 30px var(--accent-glow);
    animation:timerPulse 2s infinite;
  }
  .timer-circle.paused{
    border-color:var(--accent2);
    animation:none;
  }
  @keyframes timerPulse{
    0%,100%{box-shadow:0 0 20px var(--accent-glow)}
    50%{box-shadow:0 0 45px var(--accent-glow),0 0 80px rgba(255,107,53,0.15)}
  }
  .timer-display{
    font-size:2.6rem;font-weight:700;font-variant-numeric:tabular-nums;
    color:var(--text);letter-spacing:0.03em;font-family:'SF Mono','Cascadia Code','Consolas',monospace;
  }
  .timer-label{
    font-size:0.72rem;color:var(--text-muted);margin-top:2px;
  }
  .timer-actions{
    display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap;
  }
  .timer-btn{
    padding:8px 20px;border-radius:20px;border:1px solid var(--border);
    background:var(--surface2);color:var(--text);font-size:0.82rem;
    cursor:pointer;transition:var(--transition);min-width:70px;
  }
  .timer-btn:hover{border-color:var(--accent)}
  .timer-btn.primary{background:var(--accent);color:#fff;border:none}
  .timer-btn.primary:hover{box-shadow:0 4px 16px var(--accent-glow)}

  /* ===== Photo ===== */
  .photo-section{margin-bottom:12px}
  .photo-add-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--surface2);border:1px dashed var(--border);
    border-radius:var(--radius-sm);padding:10px 18px;color:var(--text-muted);
    font-size:0.85rem;cursor:pointer;transition:var(--transition)
  }
  .photo-add-btn:hover{border-color:var(--accent);color:var(--accent)}
  .photo-preview{
    display:none;position:relative;display:inline-block;margin-top:8px;
  }
  .photo-preview img{
    max-width:200px;max-height:150px;border-radius:var(--radius-sm);
    border:1px solid var(--border);
  }
  .photo-preview .photo-remove{
    position:absolute;top:-8px;right:-8px;
    width:24px;height:24px;border-radius:50%;
    background:var(--red);color:#fff;border:none;font-size:14px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    line-height:1;
  }
  .photo-thumb{
    width:48px;height:48px;border-radius:8px;object-fit:cover;
    border:1px solid var(--border);flex-shrink:0;cursor:pointer;
    transition:var(--transition)
  }
  .photo-thumb:hover{transform:scale(1.1)}

  /* Tab pages */
  .tab-page{display:none}
  .tab-page.active{display:block}

  /* Header */
  .header{display:flex;align-items:center;gap:12px;padding:8px 0 24px}
  .logo-icon{
    width:42px;height:42px;
    background:linear-gradient(135deg,var(--accent),#e55a2b);
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 20px var(--accent-glow);flex-shrink:0;
  }
  .logo-icon svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2.5}
  .header-title{font-size:1.4rem;font-weight:700;letter-spacing:-0.02em}
  .header-title span{color:var(--accent)}

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .stat-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px 10px;text-align:center;transition:var(--transition)
  }
  .stat-card:hover{border-color:var(--accent);box-shadow:0 0 18px var(--accent-glow)}
  .stat-value{font-size:1.4rem;font-weight:700;color:var(--accent)}
  .stat-label{font-size:0.75rem;color:var(--text-muted);margin-top:2px}

  /* Card */
  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:20px;margin-bottom:16px
  }
  .card-title{
    font-size:1rem;font-weight:600;margin-bottom:16px;
    display:flex;align-items:center;gap:8px
  }
  .card-title svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2}

  /* Form */
  .form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group label{font-size:0.75rem;color:var(--text-muted);font-weight:500}
  .form-group input{
    background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:11px 12px;color:var(--text);
    font-size:0.92rem;outline:none;transition:var(--transition)
  }
  .form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .form-group input::placeholder{color:var(--text-muted)}
  .btn{
    width:100%;background:linear-gradient(135deg,var(--accent),#e55a2b);
    color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;
    font-size:0.95rem;font-weight:600;cursor:pointer;
    transition:var(--transition);letter-spacing:0.02em
  }
  .btn:hover{box-shadow:0 4px 22px var(--accent-glow);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-sm{
    font-size:0.78rem;padding:6px 14px;border-radius:8px;
    background:var(--surface2);color:var(--text);border:1px solid var(--border);
    cursor:pointer;transition:var(--transition)
  }
  .btn-sm:hover{border-color:var(--accent)}
  .btn-sm.accent{background:var(--accent);color:#fff;border:none}
  .checked-today{background:var(--green)!important;pointer-events:none;box-shadow:0 4px 18px var(--green-glow)!important}

  /* Calendar */
  .calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .calendar-month{font-size:1rem;font-weight:600}
  .cal-nav-btn{
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:5px 12px;cursor:pointer;font-size:0.82rem;transition:var(--transition)
  }
  .cal-nav-btn:hover{border-color:var(--accent)}
  .weekday-row{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px}
  .weekday-row span{font-size:0.7rem;color:var(--text-muted);padding:3px 0}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
  .cal-cell{
    aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:0.82rem;transition:var(--transition);cursor:default;color:var(--text-muted)
  }
  .cal-cell.in-month{color:var(--text);cursor:pointer}
  .cal-cell.in-month:hover{background:var(--surface2)}
  .cal-cell.today{font-weight:700;box-shadow:inset 0 0 0 2px var(--accent)}
  .cal-cell.checked{
    background:linear-gradient(135deg,var(--accent),#e55a2b);
    color:#fff;font-weight:600;box-shadow:0 2px 8px var(--accent-glow)
  }

  /* History */
  .history-list{display:flex;flex-direction:column;gap:8px}
  .history-item{
    display:flex;align-items:center;gap:12px;
    background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;
    transition:var(--transition);flex-wrap:wrap
  }
  .history-item:hover{background:#2a2a38}
  .history-date{font-size:0.75rem;color:var(--text-muted);min-width:50px;text-align:center;line-height:1.3}
  .history-date strong{display:block;font-size:1rem;color:var(--text)}
  .history-stats{display:flex;gap:16px;flex:1;font-size:0.85rem}
  .history-stats span{color:var(--text-muted)}
  .history-stats strong{color:var(--accent);font-weight:600}

  /* Community */
  .post-composer{
    background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius);padding:16px;margin-bottom:16px
  }
  .post-composer textarea{
    width:100%;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:12px;color:var(--text);
    font-size:0.9rem;resize:vertical;min-height:60px;outline:none;
    font-family:inherit;transition:var(--transition)
  }
  .post-composer textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .composer-bar{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px;flex-wrap:wrap}
  .post-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:16px;margin-bottom:12px
  }
  .post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .post-avatar{
    width:36px;height:36px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#e55a2b);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:0.85rem;color:#fff;flex-shrink:0
  }
  .post-meta{font-size:0.78rem;color:var(--text-muted)}
  .post-meta strong{color:var(--text);font-size:0.85rem}
  .post-body{font-size:0.9rem;margin-bottom:8px;line-height:1.5}
  .post-run-tag{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,107,53,0.12);border-radius:8px;
    padding:6px 10px;font-size:0.75rem;color:var(--accent);margin:6px 0
  }
  .post-actions{display:flex;gap:16px;margin-top:8px}
  .post-actions button{
    background:none;border:none;color:var(--text-muted);font-size:0.78rem;
    cursor:pointer;display:flex;align-items:center;gap:4px;transition:var(--transition)
  }
  .post-actions button:hover{color:var(--accent)}
  .post-actions button.liked{color:var(--accent)}
  .comments-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .comment-item{display:flex;gap:8px;margin-bottom:8px;font-size:0.82rem;align-items:flex-start}
  .comment-avatar{
    width:26px;height:26px;border-radius:50%;
    background:var(--surface2);display:flex;align-items:center;
    justify-content:center;font-size:0.7rem;color:var(--text-muted);flex-shrink:0
  }
  .comment-body{flex:1}
  .comment-body strong{font-size:0.78rem;margin-right:4px}
  .comment-input-row{display:flex;gap:8px;margin-top:6px}
  .comment-input-row input{
    flex:1;background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;padding:8px 10px;color:var(--text);font-size:0.82rem;outline:none
  }
  .comment-input-row input:focus{border-color:var(--accent)}

  /* Photo Lightbox */
  .photo-lightbox{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
    z-index:150;align-items:center;justify-content:center;cursor:pointer;
  }
  .photo-lightbox.show{display:flex}
  .photo-lightbox img{
    max-width:90vw;max-height:90vh;border-radius:var(--radius);
    border:2px solid var(--border);
  }

  /* Share Canvas */
  .share-modal-bg{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);
    z-index:100;align-items:center;justify-content:center
  }
  .share-modal-bg.show{display:flex}
  .share-modal{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:20px;max-width:400px;width:90%;
    text-align:center
  }
  .share-modal canvas{border-radius:var(--radius-sm);max-width:100%}
  .share-btns{display:flex;gap:10px;margin-top:14px;justify-content:center;flex-wrap:wrap}

  /* Knowledge */
  .knowledge-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:16px;gap:10px;flex-wrap:wrap
  }
  .weekly-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(46,204,113,0.12);border-radius:20px;
    padding:5px 14px;font-size:0.75rem;color:var(--green)
  }
  .weekly-badge::before{
    content:'';width:7px;height:7px;background:var(--green);
    border-radius:50%;animation:pulse 2s infinite
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .knowledge-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px;margin-bottom:12px;
    cursor:pointer;transition:var(--transition);position:relative;overflow:hidden
  }
  .knowledge-card:hover{border-color:var(--accent)}
  .knowledge-card.featured{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
  .kc-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .kc-icon{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-size:18px
  }
  .kc-title{font-weight:600;font-size:0.95rem}
  .kc-summary{font-size:0.82rem;color:var(--text-muted);margin-bottom:6px;line-height:1.5}
  .kc-detail{font-size:0.82rem;color:var(--text);line-height:1.7;display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
  .kc-detail.show{display:block}
  .kc-source{font-size:0.7rem;color:var(--text-muted);margin-top:8px}

  /* Profile */
  .profile-card{text-align:center;padding:28px 20px}
  .profile-avatar{
    width:72px;height:72px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#e55a2b);
    margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;color:#fff;font-weight:700
  }
  .profile-name{font-size:1.2rem;font-weight:600}
  .profile-bio{font-size:0.82rem;color:var(--text-muted);margin:6px 0 12px}
  .profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .ps-val{font-size:1.2rem;font-weight:700;color:var(--accent)}
  .ps-lbl{font-size:0.72rem;color:var(--text-muted)}

  /* Bottom Nav */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:rgba(15,15,24,0.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--border);
    display:flex;justify-content:space-around;
    height:var(--nav-h);align-items:center;
    padding:0 8px env(safe-area-inset-bottom, 8px)
  }
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--text-muted);cursor:pointer;
    font-size:0.68rem;padding:6px 10px;transition:var(--transition)
  }
  .nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2}
  .nav-item.active{color:var(--accent)}

  /* Modal */
  .modal-bg{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);
    z-index:100;align-items:center;justify-content:center
  }
  .modal-bg.show{display:flex}
  .modal-box{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:24px;max-width:400px;width:90%
  }
  .modal-box h3{font-size:1rem;margin-bottom:14px}
  .modal-box input,.modal-box textarea{
    width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:10px;color:var(--text);
    font-size:0.9rem;outline:none;margin-bottom:10px;font-family:inherit
  }
  .modal-box input:focus,.modal-box textarea:focus{border-color:var(--accent)}

  /* Toast */
  .toast{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);

  }

<script>
/* ===== Auth Layer ===== */
const USERS_KEY = 'run_tracker_users';
const SESSION_KEY = 'run_tracker_session';
let currentUser = null;

function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY))||{}}catch{return{}}}
function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u))}

function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
  document.querySelector(`.auth-tab:nth-child(${tab==='login'?1:2})`).classList.add('active');
  document.getElementById(tab==='login'?'authFormLogin':'authFormReg').classList.add('active');
  document.getElementById('loginError').textContent='';
  document.getElementById('regError').textContent='';
}

function doLogin(){
  const name=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  document.getElementById('loginError').textContent='';
  if(!name||!pass){document.getElementById('loginError').textContent='请输入用户名和密码';return}
  const users=getUsers();
  if(!users[name]){document.getElementById('loginError').textContent='用户不存在，请先注册';return}
  if(users[name].password!==pass){document.getElementById('loginError').textContent='密码错误';return}
  currentUser=name;
  localStorage.setItem(SESSION_KEY,JSON.stringify({user:name,time:Date.now()}));
  initApp();
}

function doRegister(){
  const name=document.getElementById('regUser').value.trim();
  const pass=document.getElementById('regPass').value;
  const pass2=document.getElementById('regPass2').value;
  document.getElementById('regError').textContent='';
  if(!name){document.getElementById('regError').textContent='请输入用户名';return}
  if(name.length<2||name.length>20){document.getElementById('regError').textContent='用户名需要 2-20 个字符';return}
  if(!/^[\u4e00-\u9fa5a-zA-Z0-9_]+$/.test(name)){document.getElementById('regError').textContent='用户名只能包含中文、字母、数字和下划线';return}
  if(!pass||pass.length<6){document.getElementById('regError').textContent='密码至少需要 6 位';return}
  if(pass!==pass2){document.getElementById('regError').textContent='两次输入的密码不一致';return}
  const users=getUsers();
  if(users[name]){document.getElementById('regError').textContent='用户名已存在';return}
  users[name]={password:pass,createdAt:Date.now()};
  saveUsers(users);
  document.getElementById('regError').style.color='var(--green)';
  document.getElementById('regError').textContent='注册成功！请切换到登录';
  document.getElementById('regUser').value='';
  document.getElementById('regPass').value='';
  document.getElementById('regPass2').value='';
  setTimeout(()=>{
    document.getElementById('regError').style.color='';
    switchAuthTab('login');
    document.getElementById('loginUser').value=name;
  },800);
}

function doLogout(){
  if(!confirm('确定退出登录？'))return;
  currentUser=null;
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('mainApp').style.display='none';
  document.getElementById('bottomNav').style.display='none';
  document.getElementById('authOverlay').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  stopTimer();
}

/* ===== Data Layer (per-user) ===== */
function dataKey(base){return base+'_'+currentUser}
const RK=()=>'run_tracker_data_'+currentUser;
const UK=()=>'run_tracker_user_'+currentUser;
const PK='run_tracker_posts'; // global

const load=k=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}};
const save=(k,v)=>{localStorage.setItem(k,JSON.stringify(v))};
const runData=()=>{let d=load(RK());return d&&typeof d==='object'?d:{}};
const postData=()=>{let p=load(PK);return Array.isArray(p)?p:[]};
const userData=()=>{let u=load(UK());return u&&typeof u==='object'?u:{name:currentUser,bio:'坚持跑步，热爱生活'}};
const estCal=d=>Math.round(d*60);
const dateKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey=()=>dateKey(new Date());

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

/* ===== Tab Switching ===== */
function switchTab(tid){
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(tid).classList.add('active');
  document.querySelector(`[data-tab="${tid}"]`).classList.add('active');
  if(tid==='tab-checkin')renderCheckin();
  if(tid==='tab-community')renderPosts();
  if(tid==='tab-knowledge')renderKnowledge();
  if(tid==='tab-profile')renderProfile();
}

/* ===== Timer ===== */
let timerInterval=null, timerRunning=false, timerPaused=false, timerSeconds=0;

function toggleTimer(){
  if(!timerRunning){ startTimer(); }
  else if(!timerPaused){ pauseTimer(); }
  else{ resumeTimer(); }
}

function startTimer(){
  timerRunning=true;timerPaused=false;timerSeconds=0;
  const circle=document.getElementById('timerCircle');
  circle.classList.add('running');circle.classList.remove('paused');
  document.getElementById('timerLabel').textContent='计时中...';
  document.getElementById('timerBtnMain').textContent='暂停';
  document.getElementById('timerBtnMain').classList.remove('primary');
  document.getElementById('timerBtnFill').style.display='none';
  updateTimerDisplay();
  timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay()},1000);
}

function pauseTimer(){
  timerPaused=true;
  document.getElementById('timerCircle').classList.add('paused');
  document.getElementById('timerLabel').textContent='已暂停';
  document.getElementById('timerBtnMain').textContent='继续';
  document.getElementById('timerBtnMain').classList.add('primary');
  clearInterval(timerInterval);timerInterval=null;
}

function resumeTimer(){
  timerPaused=false;
  document.getElementById('timerCircle').classList.remove('paused');
  document.getElementById('timerLabel').textContent='计时中...';
  document.getElementById('timerBtnMain').textContent='暂停';
  document.getElementById('timerBtnMain').classList.remove('primary');
  document.getElementById('timerBtnFill').style.display='none';
  timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay()},1000);
}

function stopTimer(){
  clearInterval(timerInterval);timerInterval=null;
  timerRunning=false;timerPaused=false;
  const circle=document.getElementById('timerCircle');
  circle.classList.remove('running','paused');
  document.getElementById('timerLabel').textContent='点击开始';
  document.getElementById('timerBtnMain').textContent='开始';
  document.getElementById('timerBtnMain').classList.add('primary');
  document.getElementById('timerBtnFill').style.display=timerSeconds>0?'inline-block':'none';
}

function resetTimer(){
  clearInterval(timerInterval);timerInterval=null;
  timerRunning=false;timerPaused=false;timerSeconds=0;
  const circle=document.getElementById('timerCircle');
  circle.classList.remove('running','paused');
  document.getElementById('timerLabel').textContent='点击开始';
  document.getElementById('timerBtnMain').textContent='开始';
  document.getElementById('timerBtnMain').classList.add('primary');
  document.getElementById('timerBtnFill').style.display='none';
  updateTimerDisplay();
}

function updateTimerDisplay(){
  const m=Math.floor(timerSeconds/60),s=timerSeconds%60;
  document.getElementById('timerDisplay').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function fillTimerToForm(){
  if(timerSeconds>0){
    const min=Math.round(timerSeconds/60);
    document.getElementById('duration').value=min;
    const dist=parseFloat(document.getElementById('distance').value)||0;
    if(dist>0)document.getElementById('calories').value=estCal(dist);
    toast('已填入用时 '+min+' 分钟');
  }
}

/* ===== Photo ===== */
let currentPhotoBase64=null;

function handlePhotoSelect(e){
  const file=e.target.files[0];if(!file)return;
  if(!file.type.match(/^image\/(jpeg|png|webp)$/)){toast('仅支持 JPG/PNG/WebP 图片');return}
  const reader=new FileReader();
  reader.onload=function(ev){
    const base64=ev.target.result;
    compressImage(base64,function(compressed){
      currentPhotoBase64=compressed;
      const preview=document.getElementById('photoPreview');
      preview.style.display='inline-block';
      preview.innerHTML=`<img src="${compressed}" alt="预览"><button class="photo-remove" onclick="removePhoto()">&times;</button>`;
    });
  };
  reader.readAsDataURL(file);
}

function compressImage(base64,callback){
  const img=new Image();img.onload=function(){
    const maxSize=200*1024;
    if(base64.length<=maxSize){callback(base64);return}
    const canvas=document.createElement('canvas');
    let w=img.width,h=img.height;
    const maxDim=1200;if(w>maxDim||h>maxDim){const ratio=Math.min(maxDim/w,maxDim/h);w=Math.round(w*ratio);h=Math.round(h*ratio)}
    canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
    let quality=0.8,result;
    do{result=canvas.toDataURL('image/jpeg',quality);quality-=0.1}while(result.length>maxSize&&quality>0.3);
    callback(result);
  };img.src=base64;
}

function renderStats(){

function doCheckin(){
  const d=runData(),tk=todayKey();if(d[tk]){toast('今日已打卡');return}
  const dist=parseFloat(document.getElementById('distance').value),dur=parseInt(document.getElementById('duration').value,10);
  if(!dist||dist<=0){toast('请输入有效距离');return}
  if(!dur||dur<=0){toast('请输入有效时长');return}
  const rec={distance:dist,duration:dur,calories:estCal(dist),timestamp:Date.now()};
  if(currentPhotoBase64)rec.photo=currentPhotoBase64;
  d[tk]=rec;
  save(RK(),d);

function renderCalendar(){
  const d=runData(),td=new Date(),ts=dateKey(td);
  document.getElementById('calMonth').textContent=calYear+'年 '+(calMonth+1)+'月';
  const fd=new Date(calYear,calMonth,1),sdow=fd.getDay(),dim=new Date(calYear,calMonth+1,0).getDate(),pmd=new Date(calYear,calMonth,0).getDate();
  const grid=document.getElementById('calendarGrid');grid.innerHTML='';
  for(let i=sdow-1;i>=0;i--){const c=document.createElement('div');c.className='cal-cell';c.textContent=pmd-i;grid.appendChild(c)}
  for(let day=1;day<=dim;day++){
    const c=document.createElement('div');c.className='cal-cell in-month';
    const dt=new Date(calYear,calMonth,day),k=dateKey(dt);
    if(k===ts)c.classList.add('today');if(d[k])c.classList.add('checked');
    c.textContent=day;
    (function(kk,el){el.addEventListener('click',function(){if(d[kk])alert(kk+'\n距离: '+d[kk].distance+' km\n时长: '+d[kk].duration+' min\n卡路里: '+d[kk].calories+' kcal')})})(k,c);
    grid.appendChild(c);
  }
  const tc=sdow+dim,rem=tc%7===0?0:7-(tc%7);
  for(let day=1;day<=rem;day++){const c=document.createElement('div');c.className='cal-cell';c.textContent=day;grid.appendChild(c)}
}

function drawShare(key){
  const d=runData(),r=d[key];if(!r)return;
  const u=userData();
  const cv=document.getElementById('shareCanvas');cv.style.display='block';cv.width=360;cv.height=560;
  const ctx=cv.getContext('2d');

  if(r.photo){
    // Photo as background
    const img=new Image();img.onload=function(){
      const iw=img.width,ih=img.height,ratio=Math.max(360/iw,240/ih);
      const dw=iw*ratio,dh=ih*ratio,dx=360/2-dw/2,dy=0;
      ctx.drawImage(img,dx,dy,dw,dh);
      const grad=ctx.createLinearGradient(0,180,0,240);
      grad.addColorStop(0,'rgba(15,15,20,0)');grad.addColorStop(1,'rgba(15,15,20,1)');
      ctx.fillStyle=grad;ctx.fillRect(0,180,360,60);
      ctx.fillStyle='#0f0f14';ctx.fillRect(0,240,360,320);
      drawShareOverlay(ctx,key,r,u);
    };img.src=r.photo;
  }else{
    const grad=ctx.createLinearGradient(0,0,360,560);grad.addColorStop(0,'#1a1a24');grad.addColorStop(1,'#0f0f14');
    ctx.fillStyle=grad;ctx.fillRect(0,0,360,560);
    drawShareOverlay(ctx,key,r,u);
  }
}
function drawShareOverlay(ctx,key,r,u){
  // Accent top bar
  ctx.fillStyle='#ff6b35';ctx.fillRect(0,0,360,4);

  // Avatar circle
  ctx.fillStyle='#ff6b35';ctx.beginPath();ctx.arc(180,48,24,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 18px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText((currentUser||'?')[0].toUpperCase(),180,49);

  // Username
  ctx.fillStyle='#e2e2e8';ctx.font='bold 16px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(currentUser,180,88);

  // Distance - main number
  ctx.fillStyle='#ff6b35';ctx.font='bold 68px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(r.distance.toFixed(1),180,162);
  ctx.fillStyle='#8888a0';ctx.font='16px -apple-system,sans-serif';ctx.fillText('公里',180,185);

  // Stats row
  const stats=[
    {l:'时长',v:r.duration+' min'},
    {l:'卡路里',v:r.calories+' kcal'},
    {l:'日期',v:key}
  ];
  stats.forEach((s,i)=>{const x=30+i*100+50;ctx.fillStyle='#e2e2e8';ctx.font='bold 18px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(s.v,x,235);ctx.fillStyle='#8888a0';ctx.font='12px -apple-system,sans-serif';ctx.fillText(s.l,x,255)});

  // Divider
  ctx.strokeStyle='#2a2a38';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,280);ctx.lineTo(330,280);ctx.stroke();

  // Quote
  ctx.fillStyle='#aaa';ctx.font='italic 16px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('"每一步都算数"',180,320);

  // Signature
  ctx.fillStyle='#8888a0';ctx.font='14px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('—— '+currentUser,180,350);

  // Bio if exists
  if(u.bio&&u.bio.trim()){
    ctx.fillStyle='#666';ctx.font='12px -apple-system,sans-serif';ctx.fillText(u.bio,180,374);
  }

  // Runner icon
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  const bx=180,by=440;
  ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by+40);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by+10);ctx.lineTo(bx-18,by+2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by+10);ctx.lineTo(bx+18,by+2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by+40);ctx.lineTo(bx-22,by+62);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by+40);ctx.lineTo(bx+20,by+66);ctx.stroke();
  ctx.beginPath();ctx.arc(bx,by-8,10,0,Math.PI*2);ctx.stroke();

  // Footer
  ctx.fillStyle='#555';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('来自 cpyyundong.com · 跑步打卡社区',180,552);
}

];
let featIdx=0;
function renderKnowledge(){
  document.getElementById('knowUpdated').textContent='最后更新: 2026-07-12';
  const fi=featIdx%KNOWLEDGE.length;
  document.getElementById('knowledgeList').innerHTML=KNOWLEDGE.map((k,i)=>{
    const isF=i===fi;
    return`<div class="knowledge-card${isF?' featured':''}" onclick="toggleKC(this)">
      <div class="kc-header"><div class="kc-icon" style="background:${k.color}22;color:${k.color}">${k.icon}</div><div class="kc-title">${k.title}</div></div>
      <div class="kc-summary">${k.summary}</div>
      <div class="kc-detail${isF?' show':''}">${k.detail}</div>
      <div class="kc-source">来源: ${k.source}</div>
    </div>`;
  }).join('');
}
function toggleKC(el){el.querySelector('.kc-detail').classList.toggle('show');el.classList.toggle('featured')}
function shuffleFeatured(){featIdx=(featIdx+1)%KNOWLEDGE.length;renderKnowledge()}

/* ===== Profile ===== */
function renderProfile(){
  const u=userData();
  document.getElementById('profileAvatar').textContent=u.name[0];
  document.getElementById('profileName').textContent=u.name;
  document.getElementById('profileBio').textContent=u.bio||'';
  const d=runData(),ks=Object.keys(d).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k));
  let dist=0;ks.forEach(k=>{dist+=d[k].distance||0});
  document.getElementById('psDays').textContent=ks.length;
  document.getElementById('psDist').textContent=dist.toFixed(1);
  document.getElementById('psPosts').textContent=postData().filter(p=>p.author===currentUser).length;
}
function openProfileEdit(){
  const u=userData();document.getElementById('editName').value=u.name;document.getElementById('editBio').value=u.bio||'';
  document.getElementById('profileModalBg').classList.add('show');
}
function closeProfileEdit(){document.getElementById('profileModalBg').classList.remove('show')}
function saveProfile(){
  const name=document.getElementById('editName').value.trim(),bio=document.getElementById('editBio').value.trim();
  if(!name){toast('昵称不能为空');return}
  save(UK(),{name,bio});closeProfileEdit();renderProfile();
  document.getElementById('userBarName').textContent=name;
  document.getElementById('userBarAvatar').textContent=name[0];
  toast('资料已保存');
}
function clearAllData(){
  if(!confirm('确定清除全部数据？包括打卡记录、社区动态和个人资料。此操作不可恢复！'))return;
  localStorage.removeItem(RK());localStorage.removeItem(PK);localStorage.removeItem(UK());
  renderCheckin();renderPosts();renderProfile();toast('全部数据已清除');
}

/* ===== Init ===== */
function initApp(){
  document.getElementById('authOverlay').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('bottomNav').style.display='block';
  document.getElementById('userBarName').textContent=currentUser;
  document.getElementById('userBarAvatar').textContent=currentUser[0];
  initCal();renderCheckin();
  // Seed posts if empty
  if(!postData().length){
    save(PK,[
      {id:1710000000001,author:'跑者阿强',text:'今天跑了10公里，配速5分20，状态不错！坚持就是胜利',run:{distance:10,duration:53,calories:600},time:'2026-07-11T07:30:00Z',likes:['晨跑达人','夜跑Lily'],comments:[{author:'晨跑达人',text:'厉害！我明天也去跑',time:'2026-07-11T08:00:00Z'}]},
      {id:1710000000002,author:'马拉松小张',text:'备战秋季马拉松，今天是长距离训练日，35公里完成！',run:{distance:35,duration:175,calories:2100},time:'2026-07-10T06:00:00Z',likes:['跑者阿强'],comments:[]},
      {id:1710000000003,author:'夜跑Lily',text:'下雨天室内跑步机5km，汗水不会骗人。',run:{distance:5,duration:28,calories:300},time:'2026-07-09T20:30:00Z',likes:['跑者阿强','晨跑达人','追风少年'],comments:[{author:'追风少年',text:'下雨天也坚持，respect！',time:'2026-07-09T21:00:00Z'}]}
    ]);
  }
}

// Check session on load
(function(){
  const session=load(SESSION_KEY);
  if(session&&session.user){
    const users=getUsers();
    if(users[session.user]){
      currentUser=session.user;
      initApp();
      return;
    }
  }
  // Show auth overlay
  document.getElementById('authOverlay').style.display='flex';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('bottomNav').style.display='none';
  // Enter key support
  document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
  document.getElementById('regPass2').addEventListener('keydown',function(e){if(e.key==='Enter')doRegister()});
})();
</script>
